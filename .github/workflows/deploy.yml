name: Deploy to Tencent Cloud Lighthouse

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn

      - name: Create deployment package
        run: |
          tar -czvf deploy.tar.gz \
            app.py \
            douyin_downloader.py \
            requirements.txt \
            templates \
            README.md

      - name: Deploy to Tencent Cloud Lighthouse
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Execute deployment script
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.TENCENT_DEPLOY_PATH || '/opt/tiktok-video-extraction' }}
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          envs: DEPLOY_PATH
          script: |
            mkdir -p "$DEPLOY_PATH"
            mkdir -p "$DEPLOY_PATH/downloads"
            mkdir -p "$DEPLOY_PATH/static"
            tar -xzvf /tmp/deploy.tar.gz -C "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            python3 -m pip install -r requirements.txt --quiet
            sudo systemctl restart tiktok-extraction || true
            echo "Deployment completed at $(date)"
