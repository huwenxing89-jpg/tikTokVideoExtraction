name: Deploy to Tencent Cloud Windows Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          tar -czvf deploy.tar.gz \
            app.py \
            douyin_downloader.py \
            requirements.txt \
            templates \
            README.md

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          source: "deploy.tar.gz"
          target: "/c/temp/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.TENCENT_DEPLOY_PATH || '/c/inetpub/wwwroot/tikTokVideoExtraction' }}
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          envs: DEPLOY_PATH
          script: |
            mkdir -p "$DEPLOY_PATH"
            mkdir -p "$DEPLOY_PATH/downloads"
            mkdir -p "$DEPLOY_PATH/static"
            tar -xzvf /c/temp/deploy.tar.gz -C "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            pip install -r requirements.txt --quiet
            pip install waitress --quiet
            echo "Deployment completed at $(date)"
