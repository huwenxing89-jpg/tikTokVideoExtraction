name: Deploy to Tencent Cloud Windows Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          command_timeout: 15m
          script_stop: true
          script: |
            powershell -Command "New-Item -ItemType Directory -Force -Path 'C:\temp'"
            powershell -Command "New-Item -ItemType Directory -Force -Path '${{ secrets.TENCENT_DEPLOY_PATH }}'"
            powershell -Command "New-Item -ItemType Directory -Force -Path '${{ secrets.TENCENT_DEPLOY_PATH }}\downloads'"
            powershell -Command "New-Item -ItemType Directory -Force -Path '${{ secrets.TENCENT_DEPLOY_PATH }}\static'"

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          source: "app.py,douyin_downloader.py,requirements.txt,README.md,templates"
          target: "${{ secrets.TENCENT_DEPLOY_PATH }}"
          strip_components: 0

      - name: Install dependencies and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          script: |
            powershell -Command "Set-Location '${{ secrets.TENCENT_DEPLOY_PATH }}'; python -m pip install -r requirements.txt"
            powershell -Command "Set-Location '${{ secrets.TENCENT_DEPLOY_PATH }}'; python -m pip install waitress"
            powershell -Command "& {
              $deployPath = '${{ secrets.TENCENT_DEPLOY_PATH }}'
              Write-Host 'Stopping existing Python processes...'
              $procs = Get-Process python -ErrorAction SilentlyContinue
              if ($procs) {
                Stop-Process -Name python -Force
                Write-Host 'Stopped Python processes'
                Start-Sleep -Seconds 3
              } else {
                Write-Host 'No Python processes found'
              }
              Write-Host 'Starting new service...'
              Start-Process python -ArgumentList '-m', 'waitress', '--host=0.0.0.0', '--port=5000', 'app:app' -WorkingDirectory $deployPath -WindowStyle Hidden
              Start-Sleep -Seconds 5
              $newProcs = Get-Process python -ErrorAction SilentlyContinue
              $port = netstat -ano | findstr ':5000.*LISTENING'
              if ($newProcs -and $port) {
                Write-Host 'Service started successfully'
                Write-Host \"Process StartTime: $($newProcs[0].StartTime)\"
              } else {
                Write-Error 'Failed to start service'
                exit 1
              }
            }"
