name: Deploy to Tencent Cloud Windows Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install waitress

      - name: Create deployment package
        run: |
          tar -czvf deploy.tar.gz \
            app.py \
            douyin_downloader.py \
            requirements.txt \
            templates \
            README.md

      - name: Deploy to Tencent Cloud Windows Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          source: "deploy.tar.gz"
          target: "C:/temp/"

      - name: Execute deployment script (PowerShell)
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.TENCENT_DEPLOY_PATH || 'C:/inetpub/wwwroot/tikTokVideoExtraction' }}
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          envs: DEPLOY_PATH
          script: |
            $deployPath = $env:DEPLOY_PATH
            Write-Host "Deploying to: $deployPath"

            # Create directories
            New-Item -ItemType Directory -Force -Path $deployPath
            New-Item -ItemType Directory -Force -Path "$deployPath/downloads"
            New-Item -ItemType Directory -Force -Path "$deployPath/static"

            # Extract files
            tar -xzvf C:/temp/deploy.tar.gz -C $deployPath

            # Install Python dependencies
            cd $deployPath
            pip install -r requirements.txt --quiet
            pip install waitress --quiet

            # Restart the Windows service (if configured)
            # Restart-Service -Name "TikTokExtraction" -Force

            Write-Host "Deployment completed at $(Get-Date)"
