name: Deploy to Tencent Cloud Windows Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          command_timeout: 15m
          script_stop: true
          script: |
            powershell -Command "New-Item -ItemType Directory -Force -Path 'C:\temp'"
            powershell -Command "New-Item -ItemType Directory -Force -Path '${{ secrets.TENCENT_DEPLOY_PATH }}'"
            powershell -Command "New-Item -ItemType Directory -Force -Path '${{ secrets.TENCENT_DEPLOY_PATH }}\downloads'"
            powershell -Command "New-Item -ItemType Directory -Force -Path '${{ secrets.TENCENT_DEPLOY_PATH }}\static'"

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          source: "app.py,douyin_downloader.py,requirements.txt,README.md,templates"
          target: "${{ secrets.TENCENT_DEPLOY_PATH }}"
          strip_components: 0

      - name: Install dependencies and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          command_timeout: 5m
          script_stop: false
          script: |
            powershell -Command "Set-Location '${{ secrets.TENCENT_DEPLOY_PATH }}'; python -m pip install -r requirements.txt; python -m pip install waitress"
            powershell -Command "Stop-Process -Name python -Force -ErrorAction SilentlyContinue; echo 'Step 1 done'"
            powershell -Command "Start-Sleep -Seconds 2; echo 'Step 2 done'"
            powershell -Command "cd '${{ secrets.TENCENT_DEPLOY_PATH }}'; Start-Process python -ArgumentList '-m waitress --host=0.0.0.0 --port=5000 app:app' -WindowStyle Hidden; echo 'Step 3 done'"
            powershell -Command "Start-Sleep -Seconds 3; echo 'Step 4 done'; Get-Process python -ErrorAction SilentlyContinue"
