name: Deploy to Tencent Cloud Windows Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          command_timeout: 15m
          script_stop: true
          script: |
            powershell -Command "New-Item -ItemType Directory -Force -Path 'C:\temp'"
            powershell -Command "New-Item -ItemType Directory -Force -Path '${{ secrets.TENCENT_DEPLOY_PATH }}'"
            powershell -Command "New-Item -ItemType Directory -Force -Path '${{ secrets.TENCENT_DEPLOY_PATH }}\downloads'"
            powershell -Command "New-Item -ItemType Directory -Force -Path '${{ secrets.TENCENT_DEPLOY_PATH }}\static'"

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          source: "app.py,douyin_downloader.py,requirements.txt,README.md,templates"
          target: "${{ secrets.TENCENT_DEPLOY_PATH }}"
          strip_components: 0

      - name: Install dependencies
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          command_timeout: 5m
          script: |
            cmd /c "cd /d ${{ secrets.TENCENT_DEPLOY_PATH }} && python -m pip install -r requirements.txt && python -m pip install waitress"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          command_timeout: 2m
          script: |
            powershell -Command "Stop-Process -Name python -Force -ErrorAction SilentlyContinue; Start-Sleep -Seconds 2; $action = New-ScheduledTaskAction -Execute 'python' -Argument '-m waitress --host=0.0.0.0 --port=5000 app:app' -WorkingDirectory '${{ secrets.TENCENT_DEPLOY_PATH }}'; $trigger = New-ScheduledTaskTrigger -Once -At (Get-Date); $settings = New-ScheduledTaskSettingsSet -StartWhenAvailable -DontStopOnIdleEnd -AllowStartIfOnBatteries; Register-ScheduledTask -TaskName 'TikTokVideoService' -Action $action -Trigger $trigger -Settings $settings -RunLevel Highest -Force | Start-ScheduledTask; Start-Sleep -Seconds 5; netstat -ano | findstr ':5000'"
